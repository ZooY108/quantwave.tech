<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0f1f3d"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Accent line left -->
  <rect x="0" y="0" width="4" height="630" fill="#2563eb"/>

  <!-- Top label -->
  <text x="80" y="100" font-family="'Segoe UI', Arial, sans-serif" font-size="18" letter-spacing="6" fill="#64748b" text-transform="uppercase">SYSTEMATIC INVESTMENT MANAGEMENT</text>

  <!-- Main logo -->
  <text x="80" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="96" font-weight="800" fill="#ffffff">QuantWave</text>
  <text x="752" y="230" font-family="'Segoe UI', Arial, sans-serif" font-size="96" font-weight="800" fill="#3b82f6">Tech</text>

  <!-- Divider -->
  <rect x="80" y="270" width="1040" height="1" fill="#1e2d45"/>

  <!-- Badges -->
  <!-- Badge 1 -->
  <rect x="80" y="310" width="280" height="90" rx="6" fill="none" stroke="#1e2d45" stroke-width="1"/>
  <text x="104" y="340" font-family="'Segoe UI', Arial, sans-serif" font-size="11" letter-spacing="3" fill="#64748b">DOMICILE</text>
  <text x="104" y="375" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600" fill="#ffffff">Singapore</text>

  <!-- Badge 2 -->
  <rect x="390" y="310" width="280" height="90" rx="6" fill="none" stroke="#1e2d45" stroke-width="1"/>
  <text x="414" y="340" font-family="'Segoe UI', Arial, sans-serif" font-size="11" letter-spacing="3" fill="#64748b">PRIME BROKER</text>
  <text x="414" y="375" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600" fill="#ffffff">IBKR Prime</text>

  <!-- Badge 3 -->
  <rect x="700" y="310" width="280" height="90" rx="6" fill="none" stroke="#1e2d45" stroke-width="1"/>
  <text x="724" y="340" font-family="'Segoe UI', Arial, sans-serif" font-size="11" letter-spacing="3" fill="#64748b">STRATEGY</text>
  <text x="724" y="375" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="600" fill="#ffffff">Systematic / Algo</text>

  <!-- Bottom -->
  <rect x="80" y="470" width="1040" height="1" fill="#1e2d45"/>
  <text x="80" y="520" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#3b82f6">quantwave.tech</text>
  <text x="80" y="556" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#64748b">Singapore · IBKR Prime · NYSE · NASDAQ · CME Futures</text>
</svg>
